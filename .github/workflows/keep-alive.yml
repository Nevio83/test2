# Hält den Render-Free-Service wach, damit Besucher nicht ~50 s auf den Cold-Start
# warten. Render schläft nach 15 Min Inaktivität – dieser Cron pingt alle 10 Min
# den leichtgewichtigen /health-Endpoint (siehe server.js).
#
# Kostenlos: das Repo ist öffentlich → GitHub-Actions-Minuten sind unbegrenzt.
# Hinweis: GitHub-Cron ist "best effort" und kann bei Last ein paar Minuten später
# laufen; deshalb 10-Min-Intervall (Puffer zum 15-Min-Sleep). Manuell startbar via
# "Run workflow" (workflow_dispatch).

name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *" # alle 10 Minuten (UTC)
  workflow_dispatch: # manueller Start im Actions-Tab

# Parallele Läufe vermeiden; ein neuer Lauf bricht einen hängenden alten ab.
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health (mit Cold-Start-Toleranz)
        run: |
          URL="https://maiosshop.com/health"
          echo "Pinge $URL"
          # --max-time 90: Cold-Start kann ~50 s dauern. --retry deckt kurze 5xx/Timeouts ab.
          code=$(curl -sS -o /tmp/health.txt -w "%{http_code}" \
            --max-time 90 --retry 3 --retry-delay 10 --retry-all-errors \
            "$URL" || true)
          echo "HTTP $code"
          cat /tmp/health.txt || true
          if [ "$code" != "200" ]; then
            echo "::warning::Health-Ping lieferte HTTP $code (Shop evtl. im Aufwachen)"
          fi
