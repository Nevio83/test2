# Render Blueprint für Maios Shop — KOSTENLOSER Plan (keine Kreditkarte nötig)
#
# Ein Node-Service bedient Frontend (express.static) UND die komplette API aus server.js
# (Checkout, Stripe-Webhook, DB, CJ, Mails). Das beseitigt die Zwei-Backend-Divergenz.
#
# ⚠️ Free-Plan-Hinweise:
#   - Kein persistenter Speicher: Die SQLite-DB (database/orders.db) wird bei jedem
#     Redeploy/Neustart geleert. Bestellungen laufen trotzdem (Stripe + E-Mail-Beleg);
#     nur das interne Bestell-Log fürs Admin-Dashboard ist nicht dauerhaft.
#   - Der Dienst schläft nach ~15 Min Inaktivität; der nächste Aufruf dauert ~1 Min.
#
# Für DAUERHAFTE Bestelldaten später (zwei Wege):
#   A) Bezahlter Plan + Disk: plan auf "starter" und einen disk-Block ergänzen
#      (mountPath: /data) sowie SQLITE_DB_PATH=/data/orders.db setzen.
#   B) KOSTENLOS & dauerhaft: Renders gratis 1-GB-PostgreSQL nutzen — dafür muss
#      database.js von SQLite auf Postgres umgestellt werden (kann ich übernehmen).

services:
  - type: web
    name: maios-shop
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NODE_ENV
        value: production

      # ── Secrets: im Render-Dashboard setzen (nicht im Blueprint) ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CJ_STRIPE_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: CJ_API_KEY
        sync: false
      - key: CJ_ACCESS_TOKEN
        sync: false
      - key: CJ_EMAIL
        sync: false
      - key: CJ_PASSWORD
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: SITE_URL
        sync: false
      - key: REPL_URL
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Neon-Postgres-Verbindungsstring (kostenlos & dauerhaft) — im Dashboard setzen
      - key: DATABASE_URL
        sync: false
