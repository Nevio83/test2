# Render Blueprint für Maios Shop
# Ein einziger persistenter Node-Service bedient Frontend (statisch via express.static)
# UND die komplette API aus server.js (Checkout, Stripe-Webhook, DB, CJ, Mails).
# Das beseitigt die bisherige Zwei-Backend-Divergenz (Netlify-Functions).
#
# Persistenz: SQLite-DB liegt auf einer gemounteten Disk (/data) -> überlebt Deploys/Neustarts.
# Hinweis: Persistente Disks erfordern einen bezahlten Plan (z.B. "starter").
#
# Setup: Render Dashboard -> New -> Blueprint -> dieses Repo wählen.
# Secrets danach im Dashboard setzen (envVars mit sync:false bleiben leer im Blueprint).

services:
  - type: web
    name: maios-shop
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true

    disk:
      name: maios-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NODE_ENV
        value: production
      # SQLite-DB auf die persistente Disk legen
      - key: SQLITE_DB_PATH
        value: /data/orders.db

      # ── Secrets: im Render-Dashboard setzen (nicht im Blueprint) ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CJ_STRIPE_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: CJ_API_KEY
        sync: false
      - key: CJ_ACCESS_TOKEN
        sync: false
      - key: CJ_EMAIL
        sync: false
      - key: CJ_PASSWORD
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: SITE_URL
        sync: false
      - key: REPL_URL
        sync: false
